<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحميل - تطبيق بن وبهارات عدي الجبلي</title>
    
    <!-- مكتبة الأيقونات الاحترافية -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- إثبات ملكية جوجل الخاص بك -->
    <meta name="google-site-verification" content="7g3uTInjNEsof8zx2Kx7w5spJUizWoORm-6T0ftiA7U" />
    
    <meta name="description" content="التطبيق الرسمي لـ بن وبهارات عدي الجبلي. نظام إدارة متطور لقصي سوفت لإدارة حسابات وديون المحل.">
    <meta name="keywords" content="بن وبهارات عدي الجبلي, عدي الجبلي, نظام إدارة ديون, قصي سوفت للإدارة الذكية, نظام محاسبة">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Cairo', sans-serif;
            /* خلفية بتدرجات ألوان القهوة والبهارات */
            background: linear-gradient(135deg, #2c1a10 0%, #4a3121 40%, #6f4e37 70%, #a67c52 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: linear-gradient(180deg, #fdfbf8 0%, #f5eee6 100%);
            max-width: 480px;
            width: 100%;
            padding: 40px 30px;
            border-radius: 30px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.4), 0 0 0 1px rgba(111,78,55,0.1);
            text-align: center;
            border: 1px solid rgba(111,78,55,0.15);
        }
        .logo {
            font-size: 28px;
            background: linear-gradient(135deg, #a67c52 0%, #6f4e37 100%);
            width: 110px;
            height: 110px;
            line-height: 110px;
            border-radius: 50%;
            margin: 0 auto 20px;
            color: #fff;
            box-shadow: 0 10px 30px rgba(111,78,55,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border: 4px solid #fff;
        }
        h1 { font-size: 26px; color: #3e2723; margin-bottom: 8px; font-weight: 700; }
        .sub { color: #5d4037; font-size: 14px; margin-bottom: 5px; line-height: 1.6; }
        .dev-info { color: #8d6e63; font-size: 13px; margin-bottom: 25px; font-weight: 400; }
        
        .btn {
            background: linear-gradient(135deg, #6f4e37 0%, #3e2723 100%);
            color: white; border: none; width: 100%;
            padding: 18px; font-size: 20px; border-radius: 15px;
            cursor: pointer; font-family: 'Cairo', sans-serif;
            font-weight: 700; transition: all 0.3s;
            box-shadow: 0 10px 30px rgba(62,39,35,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn:hover { 
            background: linear-gradient(135deg, #8d6e63 0%, #6f4e37 100%);
            transform: translateY(-2px); 
            box-shadow: 0 15px 35px rgba(62,39,35,0.5);
        }
        .btn:disabled { 
            background: #bcaaa4; 
            transform: none; 
            cursor: not-allowed; 
            box-shadow: none;
        }
        #info { margin-top: 15px; font-size: 15px; color: #3e2723; line-height: 1.7; }
        .loader {
            display: none; width: 35px; height: 35px;
            margin: 15px auto 0; border: 4px solid #d7ccc8;
            border-top: 4px solid #a67c52; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .footer { margin-top: 30px; font-size: 12px; color: #a1887f; border-top: 1px solid #eee; padding-top: 15px; }
        
        .badge {
            display: inline-block; background: #efebe9;
            padding: 6px 18px; border-radius: 20px;
            font-size: 13px; color: #5d4037; margin-top: 15px;
            border: 1px solid #d7ccc8;
        }
        .warn { color: #bf360c; font-weight: 700; }
        .ok { color: #2e7d32; font-weight: 700; }
        .debug { font-size: 11px; color: #9a7a7a; margin-top: 8px; word-break: break-all; }
    </style>
</head>
<body>
    <div class="card">
        <!-- الأيقونات -->
        <div class="logo">
            <i class="fas fa-coffee"></i>
            <i class="fas fa-seedling"></i>
            <i class="fas fa-mortar-pestle"></i>
        </div>
        
        <h1>تطبيق بن وبهارات عدي الجبلي</h1>
        <p class="sub">النظام الرسمي لإدارة الحسابات، الديون، وحركة المخزون</p>
        <p class="dev-info">برمجة وتطوير وتصميم قصي المليكي 778010546</p>

        <button class="btn" id="downloadBtn">
            <i class="fas fa-cloud-download-alt"></i>
            تحميل التطبيق الآن
        </button>

        <div id="info"></div>
        <div class="loader" id="loader"></div>
        <div id="badge" class="badge"></div>
        <div class="debug" id="debug"></div>

        <div class="footer">جميع الحقوق محفوظة لدى قصي سوفت © 2026</div>
    </div>

    <script>
        async function getArchitecture() {
            var ua = navigator.userAgent.toLowerCase();
            var platform = (navigator.platform || '').toLowerCase();
            var debugParts = [];

            if (platform) {
                debugParts.push('platform=' + navigator.platform);
                if (platform.indexOf('armv8') !== -1 || platform.indexOf('aarch64') !== -1) {
                    return { apk: 'arm64-v8a', name: '64 بت', method: 'navigator.platform', debug: debugParts };
                }
                if (platform.indexOf('armv7') !== -1) {
                    return { apk: 'armeabi-v7a', name: '32 بت', method: 'navigator.platform', debug: debugParts };
                }
            }

            if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                try {
                    var vals = await navigator.userAgentData.getHighEntropyValues(['architecture', 'bitness', 'model']);
                    debugParts.push('uaData=' + JSON.stringify(vals));

                    if (vals.bitness) {
                        var arch = (vals.architecture || '').toLowerCase();
                        var bits = vals.bitness;
                        if ((arch === 'arm' || arch === 'aarch64') && bits === '64') {
                            return { apk: 'arm64-v8a', name: '64 بت', method: 'UAData', debug: debugParts };
                        }
                        if (arch === 'arm' && bits === '32') {
                            return { apk: 'armeabi-v7a', name: '32 بت', method: 'UAData', debug: debugParts };
                        }
                    }
                } catch (e) {
                    debugParts.push('uaDataErr=' + e.message);
                }
            }

            if (ua.indexOf('aarch64') !== -1 || ua.indexOf('arm64') !== -1) {
                return { apk: 'arm64-v8a', name: '64 بت', method: 'UserAgent', debug: debugParts };
            }
            if (ua.indexOf('armv7') !== -1 || ua.indexOf('armv7l') !== -1) {
                return { apk: 'armeabi-v7a', name: '32 بت', method: 'UserAgent', debug: debugParts };
            }

            var modelMatch = ua.match(/\(([^)]+)\)/);
            if (modelMatch) {
                var m = modelMatch[1].toLowerCase();
                debugParts.push('model=' + m);

                var samsung64 = /sm-g95|sm-g96|sm-g97|sm-g98|sm-g99|sm-n95|sm-n96|sm-n97|sm-n98|sm-f90|sm-f91|sm-a73|sm-a53|sm-a54|sm-a34|sm-s90|sm-m54|sm-m34|sm-m14/;
                var xiaomi64 = /mi 9|mi 10|mi 11|mi 12|mi 13|redmi note 9|redmi note 1[0-9]|redmi 1[0-9]|poco f[2-9]|poco x[3-9]|poco m[3-9]/;
                var other64 = /pixel [3-9]|pixel [a-z]|oneplus [6-9]|oneplus 1[0-9]|realme gt|realme [0-9]+pro|oppo r[1-9][0-9]|vivo v[2-9][0-9]/;
                var huawei64 = /huawei p[3-9][0-9]|huawei mate [3-9][0-9]|honor [2-9][0-9]|nova [5-9]/;

                if (samsung64.test(m) || xiaomi64.test(m) || other64.test(m) || huawei64.test(m)) {
                    return { apk: 'arm64-v8a', name: '64 بت', method: 'طراز الجهاز', debug: debugParts };
                }
            }

            var androidVer = ua.match(/android\s+(\d+)/);
            if (androidVer) {
                var v = parseInt(androidVer[1]);
                debugParts.push('android=' + v);
                if (v >= 12) {
                    return { apk: 'arm64-v8a', name: '64 بت', method: 'Android 12+', debug: debugParts };
                }
            }

            return { 
                apk: 'armeabi-v7a', 
                name: '32 بت (عام)', 
                method: 'افتراضي آمن',
                note: 'النسخة 32 بت تعمل على جميع الأجهزة بما فيها 64 بت',
                debug: debugParts
            };
        }

        document.getElementById('downloadBtn').addEventListener('click', async function() {
            var btn = document.getElementById('downloadBtn');
            var info = document.getElementById('info');
            var loader = document.getElementById('loader');
            var badge = document.getElementById('badge');
            var debug = document.getElementById('debug');

            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التعرف...';
            loader.style.display = 'block';
            info.innerHTML = '';
            badge.textContent = '';
            debug.textContent = '';

            var result = await getArchitecture();

            badge.textContent = 'جهازك: ' + result.name + ' | طريقة: ' + result.method;

            var msg = '<span class="ok">✓ تم التعرف</span>';
            if (result.note) msg += '<br><span class="warn">' + result.note + '</span>';
            info.innerHTML = msg;
            debug.textContent = result.debug.join(' | ');

            btn.innerHTML = '<i class="fas fa-file-download"></i> جاري تحميل ' + result.apk + '...';

            var url = 'https://github.com/QUSAI-ALPRINS/oday-download/releases/download/v1.0.0+1/app-' + result.apk + '.apk';
            window.location.href = url;

            setTimeout(function() {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-cloud-download-alt"></i> تحميل التطبيق الآن';
                loader.style.display = 'none';
                info.innerHTML += '<br><br>إذا لم يبدأ التحميل: <a href="' + url + '" style="color:#6f4e37;font-weight:bold;">اضغط هنا</a>';
            }, 1500);
        });
    </script>
</body>
</html>
